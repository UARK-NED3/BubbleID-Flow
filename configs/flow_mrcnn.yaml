# Baseline Detectron2 Mask R-CNN settings for flow boiling fine-tuning.
# This file is intentionally lightweight; training code will merge it with
# COCO-InstanceSegmentation/mask_rcnn_R_50_FPN_3x.yaml.

MODEL:
  ROI_HEADS:
    NUM_CLASSES: 1
    SCORE_THRESH_TEST: 0.4
SOLVER:
  IMS_PER_BATCH: 1
  BASE_LR: 0.00001
  MAX_ITER: 1000
TEST:
  EVAL_PERIOD: 100
